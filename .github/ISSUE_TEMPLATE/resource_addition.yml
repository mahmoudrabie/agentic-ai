name: Resource addition
description: Suggest a new paper/post/resource to include
title: "[Resource]: "
labels: [enhancement]
body:
  - type: input
    id: title
    attributes:
      label: Resource title
      placeholder: Paper title in plain text
    validations:
      required: true
  - type: input
    id: canonical_link
    attributes:
      label: Canonical resource link
      description: Prefer the original paper, code repository, benchmark, docs, or official project page.
      placeholder: https://arxiv.org/abs/...
    validations:
      required: true
  - type: input
    id: code_link
    attributes:
      label: Code or project link
      description: Optional. Add this when it differs from the canonical paper or project page.
      placeholder: https://github.com/owner/repo
  - type: input
    id: commentary_link
    attributes:
      label: Commentary link
      description: Optional. LinkedIn, X, blog, or summary post.
      placeholder: https://...
  - type: dropdown
    id: resource_type
    attributes:
      label: Resource type
      options:
        - Paper
        - Benchmark
        - Framework
        - Tool
        - Survey
        - Dataset
        - Case study
        - Implementation
        - Other
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Suggested domain
      options:
        - Foundation Models
        - Reasoning
        - Planning
        - Vision
        - Recommendation
        - Software Engineering
        - Testing
        - Framework
        - Automation
        - Healthcare
        - Security
        - OT/IoT
        - Smart Cities
        - Transportation
        - Supply Chain
        - Robotics
        - Hardware Design
        - Design
        - Networking
        - Blockchain
        - Research
        - Education
        - Gaming
        - Ethics and Safety
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional context for why this belongs in the selected domain, plus any relevant tags.

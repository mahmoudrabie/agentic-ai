name: Canonical link upgrade
description: Replace or supplement a social-only entry with original source links
title: "[Canonical link]: "
labels: [enhancement, curation]
body:
  - type: input
    id: existing_entry
    attributes:
      label: Existing entry title
      placeholder: Exact title from the domain README
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - Foundation Models
        - Reasoning
        - Planning
        - Vision
        - Recommendation
        - Software Engineering
        - Testing
        - Framework
        - Automation
        - Healthcare
        - Security
        - OT/IoT
        - Smart Cities
        - Transportation
        - Supply Chain
        - Robotics
        - Hardware Design
        - Design
        - Networking
        - Blockchain
        - Research
        - Education
        - Gaming
        - Ethics and Safety
    validations:
      required: true
  - type: input
    id: canonical_link
    attributes:
      label: Canonical link
      description: Original paper, code repository, benchmark, docs, or official project page.
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: code_link
    attributes:
      label: Code link
      description: Optional, if different from the canonical link.
      placeholder: https://github.com/owner/repo
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any context needed to verify the link or place the resource correctly.

